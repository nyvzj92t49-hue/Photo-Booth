<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; media-src 'self' blob:; style-src 'self'; script-src 'self'" />
    <title>Photobooth Camo</title>
    <link rel="stylesheet" href="styles.css?v=6" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">SOURIEZ !</p>
          <h1>Photobooth</h1>
        </div>
        <div class="top-actions">
          <label class="camera-picker">
            <span>Caméra</span>
            <select id="cameraSelect" aria-label="Choisir la caméra"></select>
          </label>
          <button id="fullscreenButton" class="icon-button" type="button" title="Plein écran">⛶</button>
        </div>
      </header>

      <section class="stage">
        <div class="viewer" id="viewer">
          <video id="video" autoplay playsinline muted></video>
          <div class="camera-message" id="cameraMessage">
            <strong>Préparation de la caméra…</strong>
            <span>Autorisez l’accès si Windows vous le demande.</span>
          </div>
          <div class="countdown" id="countdown" aria-live="assertive"></div>
          <div class="flash" id="flash"></div>
        </div>

        <aside class="panel">
          <div class="status-card">
            <span class="status-dot" id="statusDot"></span>
            <div>
              <strong id="statusTitle">Connexion…</strong>
              <p id="statusText">Recherche de Camo</p>
            </div>
          </div>

          <button id="captureButton" class="capture-button" type="button" disabled>
            <span class="lens"></span>
            <span>Prendre une photo</span>
            <small>Compte à rebours de 3 secondes</small>
          </button>

        </aside>
      </section>
      <canvas id="canvas" hidden></canvas>
    </main>
    <script src="renderer.js?v=4"></script>
  </body>
</html>
